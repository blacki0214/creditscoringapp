<span class="material-symbols-outlined text-[#4A52FF]" data-icon="arrow_back">arrow_back</span>

<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-on-surface">Financial Atelier</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden">

</div>
</header>
<main class="mt-20 px-6 max-w-md mx-auto">
<!-- Progress Indicator -->
<section class="mb-10">
<div class="flex justify-between items-end mb-4">
<div class="space-y-1">
<span class="font-label text-xs font-semibold tracking-widest text-primary uppercase">Step 1 of 4</span>
<h2 class="font-headline text-2xl font-extrabold tracking-tight text-on-background">Personal Information</h2>
</div>
</div>
<!-- Breadcrumb-Pill Progress -->
<div class="flex gap-2 h-1.5 w-full">
<div class="flex-1 rounded-full signature-gradient"></div>
<div class="flex-1 rounded-full bg-outline-variant opacity-20"></div>
<div class="flex-1 rounded-full bg-outline-variant opacity-20"></div>
<div class="flex-1 rounded-full bg-outline-variant opacity-20"></div>
</div>
</section>
<!-- Form Section -->
<form class="space-y-8">
<!-- Full Name (Locked) -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center text-outline">
<span class="material-symbols-outlined text-sm" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low text-on-surface font-semibold rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" readonly="" type="text" value="NGUYEN TAN PHAT"/>
</div>
<p class="text-[10px] text-outline ml-1">Verified via national identity database.</p>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Date of Birth -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Date of Birth</label>
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center text-outline">
<span class="material-symbols-outlined text-sm" data-icon="calendar_today">calendar_today</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low text-on-surface rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" placeholder="DD/MM/YYYY" type="text"/>
</div>
</div>
<!-- Gender -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Gender</label>
<select class="w-full h-14 px-4 bg-surface-container-low text-on-surface rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all appearance-none">
<option>Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>
</div>
<!-- Nationality -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Nationality</label>
<div class="relative">
<select class="w-full h-14 px-4 bg-surface-container-low text-on-surface font-medium rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all">
<option selected="">Viet Nam</option>
<option>United States</option>
<option>Singapore</option>
<option>Japan</option>
</select>
</div>
</div>
<!-- Asymmetric Grid for Marital & Education -->
<div class="grid grid-cols-1 gap-6">
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Marital Status</label>
<div class="grid grid-cols-3 gap-2">
<button class="h-12 flex items-center justify-center rounded-xl bg-surface-container-low text-xs font-bold text-on-surface hover:bg-surface-container transition-colors" type="button">Single</button>
<button class="h-12 flex items-center justify-center rounded-xl bg-secondary-container text-xs font-bold text-on-secondary-container" type="button">Married</button>
<button class="h-12 flex items-center justify-center rounded-xl bg-surface-container-low text-xs font-bold text-on-surface hover:bg-surface-container transition-colors" type="button">Other</button>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Education Level</label>
<select class="w-full h-14 px-4 bg-surface-container-low text-on-surface rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all">
<option>Bachelor's Degree</option>
<option>Master's Degree</option>
<option>Doctorate</option>
<option>High School</option>
</select>
</div>
</div>
<!-- ID Document -->
<div class="p-6 rounded-xl bg-surface-container-lowest shadow-[0_20px_40px_rgba(12,15,17,0.06)] space-y-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="badge">badge</span>
</div>
<div>
<h4 class="font-headline text-sm font-bold text-on-background">Identity Document</h4>
<p class="text-[10px] text-outline uppercase tracking-wider">CCCD / Passport ID</p>
</div>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center text-outline">
<span class="material-symbols-outlined text-sm" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low text-on-surface font-mono font-medium rounded-xl border-none" readonly="" type="text" value="07909300****"/>
</div>
</div>

<div class="max-w-md mx-auto">
<button class="w-full h-16 signature-gradient text-on-primary font-headline font-bold text-base rounded-xl shadow-lg shadow-primary/25 active:scale-95 duration-200 flex items-center justify-center gap-3">
                Next: Employment Info
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
